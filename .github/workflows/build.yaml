name: Build and Release OpenClaw Launcher (Pre-built ZIP)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  NODE_VERSION: "v24.14.0"
  GIT_VERSION: "v2.44.0"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # ==========================================
    # 1. 构建 Launcher.exe (自包含)
    # ==========================================
    - name: Restore dependencies
      run: dotnet restore

    - name: Build Launcher (Self-Contained)
      run: |
        dotnet publish OpenClawInstaller.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:EnableCompressionInSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:Deterministic=true `
          -o ./publish_output

    # ==========================================
    # 2. 预构建运行时环境
    # ==========================================
    - name: Create runtime directories
      run: |
        New-Item -ItemType Directory -Force -Path ./package/runtime
        New-Item -ItemType Directory -Force -Path ./package/data

    - name: Download and extract Node.js
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $nodeUrl = "https://registry.npmmirror.com/-/binary/node/${{ env.NODE_VERSION }}/node-${{ env.NODE_VERSION }}-win-x64.zip"
        Write-Host "Downloading Node.js from $nodeUrl"
        Invoke-WebRequest -Uri $nodeUrl -OutFile node.zip -UseBasicParsing
        Write-Host "Extracting Node.js..."
        Expand-Archive -Path node.zip -DestinationPath ./package/runtime -Force
        $nodeDir = Get-ChildItem -Path ./package/runtime -Filter "node-*" -Directory | Select-Object -First 1
        if ($null -eq $nodeDir) { throw "Node.js extraction failed - no node-* directory found" }
        Rename-Item -Path $nodeDir.FullName -NewName "nodejs"
        Remove-Item node.zip
        # 验证
        if (!(Test-Path "./package/runtime/nodejs/node.exe")) { throw "node.exe not found after extraction!" }
        Write-Host "✓ Node.js ready"

    - name: Download and extract MinGit
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $gitUrl = "https://github.com/git-for-windows/git/releases/download/${{ env.GIT_VERSION }}.windows.1/MinGit-2.44.0-64-bit.zip"
        Write-Host "Downloading MinGit from $gitUrl"
        Invoke-WebRequest -Uri $gitUrl -OutFile mingit.zip -UseBasicParsing
        New-Item -ItemType Directory -Force -Path ./package/runtime/git_env
        Expand-Archive -Path mingit.zip -DestinationPath ./package/runtime/git_env -Force
        Remove-Item mingit.zip
        # 验证
        if (!(Test-Path "./package/runtime/git_env/cmd/git.exe")) { throw "git.exe not found after extraction!" }
        Write-Host "✓ MinGit ready"

    - name: Setup OpenClaw app with npm install
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $nodejsDir = (Resolve-Path "./package/runtime/nodejs").Path
        $appDir = "./package/runtime/openclaw_app"
        New-Item -ItemType Directory -Force -Path $appDir

        # 创建 package.json
        $packageJson = '{"name":"openclaw-env","version":"1.0.0","private":true}'
        Set-Content -Path "$appDir/package.json" -Value $packageJson -Encoding UTF8

        # 使用便携 Node.js 的 npm 来安装 openclaw
        $env:PATH = "$nodejsDir;$env:PATH"
        
        # 配置 npm 镜像
        & "$nodejsDir/npm.cmd" config set registry https://registry.npmmirror.com

        # 安装 openclaw
        Push-Location $appDir
        & "$nodejsDir/npm.cmd" install openclaw --no-fund --no-audit
        if ($LASTEXITCODE -ne 0) { throw "npm install openclaw failed with exit code $LASTEXITCODE" }
        Pop-Location
        Write-Host "✓ OpenClaw installed"

    # ==========================================
    # 3. 下载 Skills 工具
    # ==========================================
    - name: Download Skills tools
      shell: pwsh
      run: |
        $skillsDir = "./package/runtime/skills_bin"
        New-Item -ItemType Directory -Force -Path $skillsDir

        $tools = @(
          @{ Name = "gh"; Url = "https://github.com/cli/cli/releases/download/v2.88.1/gh_2.88.1_windows_amd64.zip" },
          @{ Name = "uv"; Url = "https://github.com/astral-sh/uv/releases/download/0.10.10/uv-x86_64-pc-windows-msvc.zip" },
          @{ Name = "ffmpeg"; Url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.0-latest-win64-gpl-shared-8.0.zip" },
          @{ Name = "camsnap"; Url = "https://github.com/steipete/camsnap/releases/download/v0.2.0/camsnap_0.2.0_windows_amd64.zip" },
          @{ Name = "blucli"; Url = "https://github.com/steipete/blucli/releases/download/v0.1.3/blucli-windows-amd64.zip" },
          @{ Name = "gog"; Url = "https://github.com/steipete/gogcli/releases/download/v0.12.0/gogcli_0.12.0_windows_amd64.zip" }
        )

        foreach ($tool in $tools) {
          Write-Host "Downloading $($tool.Name)..."
          $zipPath = "$skillsDir/$($tool.Name).zip"
          try {
            Invoke-WebRequest -Uri $tool.Url -OutFile $zipPath -UseBasicParsing
            $extractDir = "$skillsDir/$($tool.Name)"
            Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
            Remove-Item $zipPath
            Write-Host "  ✓ $($tool.Name) installed"
          } catch {
            Write-Host "  ✗ Failed to download $($tool.Name): $_"
          }
        }

    # ==========================================
    # 4. 组装最终包
    # ==========================================
    - name: Assemble package
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        # 复制 Launcher exe 到包根目录
        Copy-Item ./publish_output/OpenClawInstaller.exe ./package/OpenClaw.exe

        # 生成备用启动脚本
        Set-Content -Path "./package/启动OpenClaw.bat" -Value "@echo off`r`npushd `"%~dp0`"`r`nOpenClaw.exe`r`npopd" -Encoding Default

        # 验证包内容
        Write-Host "=== Package contents ==="
        Get-ChildItem -Path ./package -Recurse -Depth 2 -Force | Format-Table FullName, Length -AutoSize
        
        # 关键文件检查
        $checks = @(
          "./package/OpenClaw.exe",
          "./package/runtime/nodejs/node.exe",
          "./package/runtime/git_env/cmd/git.exe",
          "./package/runtime/openclaw_app/package.json"
        )
        foreach ($check in $checks) {
          if (Test-Path $check) {
            Write-Host "✓ $check"
          } else {
            throw "✗ MISSING: $check"
          }
        }

    - name: Generate Version Tag
      id: tag
      shell: bash
      run: echo "release_tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    # ==========================================
    # 5. 打包并发布 (先打包, 再设隐藏属性说明)
    # ==========================================
    - name: Create ZIP package
      shell: pwsh
      run: |
        # 用 .NET 的 ZipFile 来打包, 确保包含所有文件(包括隐藏的)
        Add-Type -Assembly System.IO.Compression.FileSystem
        $src = (Resolve-Path "./package").Path
        $dst = (Join-Path (Get-Location) "OpenClaw-Windows-x64.zip")
        if (Test-Path $dst) { Remove-Item $dst }
        [System.IO.Compression.ZipFile]::CreateFromDirectory($src, $dst)
        $size = (Get-Item $dst).Length / 1MB
        Write-Host "ZIP size: $([math]::Round($size, 2)) MB"

    - name: Create Release and Upload
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: OpenClaw ${{ steps.tag.outputs.release_tag }}
        body: |
          ## 🦞 OpenClaw 一键启动包

          **使用方式：解压 → 双击 `OpenClaw.exe` → 开始使用!**

          ### 包含内容
          - OpenClaw Launcher (自包含, 无需安装 .NET)
          - Node.js (便携版)
          - MinGit (便携版)
          - OpenClaw 核心组件 (已预安装)
          - Skills 工具集 (gh, uv, ffmpeg, camsnap, blucli, gog)

          ### 首次使用
          1. 解压 ZIP 到任意目录
          2. 双击 `OpenClaw.exe`
          3. 按提示运行 Onboard 向导配置 API Key
          4. 开始聊天!

          ### 安全提示
          - 本程序所有数据存储在解压目录下, 不会修改系统注册表或全局环境变量
        draft: false
        prerelease: false
        files: ./OpenClaw-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (Backup)
      uses: actions/upload-artifact@v4
      with:
        name: OpenClaw-Windows-x64
        path: ./OpenClaw-Windows-x64.zip
